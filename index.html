    <!-- Structured data: Organization + product + FAQ (rich snippets) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://sendmymail.vercel.app/#org",
            "name": "SendMyMail",
            "url": "https://sendmymail.vercel.app/",
            "logo": "https://sendmymail.vercel.app/favicon.svg",
            "description": "The email marketing platform built for Nepal — for agencies juggling many client brands, and for the brands themselves.",
            "email": "hello@sendmymail.np",
            "areaServed": { "@type": "Country", "name": "Nepal" },
            "address": { "@type": "PostalAddress", "addressLocality": "Kathmandu", "addressCountry": "NP" },
            "contactPoint": { "@type": "ContactPoint", "email": "hello@sendmymail.np", "contactType": "customer support", "areaServed": "NP" },
            "sameAs": []
          },
          {
            "@type": "WebSite",
            "@id": "https://sendmymail.vercel.app/#website",
            "url": "https://sendmymail.vercel.app/",
            "name": "SendMyMail",
            "publisher": { "@id": "https://sendmymail.vercel.app/#org" }
          },
          {
            "@type": "SoftwareApplication",
            "name": "SendMyMail",
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Web",
            "offers": { "@type": "Offer", "price": "1500", "priceCurrency": "NPR" },
            "description": "A drag-and-drop email editor, per-client brand kits and one multi-client dashboard — with NPR billing via eSewa, Khalti and IME Pay."
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "Will my emails actually land in the inbox in Nepal?",
                "acceptedAnswer": { "@type": "Answer", "text": "Yes. We send over verified domains with proper SPF/DKIM/DMARC and tune deliverability for Gmail and Outlook, where Nepali recipients are — targeting ~96% inbox placement, shown per campaign." }
              },
              {
                "@type": "Question",
                "name": "Can I migrate from Mailchimp or MailerLite?",
                "acceptedAnswer": { "@type": "Answer", "text": "Yes — bring your contacts, lists and templates over in an afternoon, and we help. You can also keep your existing ESP connected: SendMyMail can push the compiled email to 40+ platforms." }
              },
              {
                "@type": "Question",
                "name": "How does billing work — is it really in rupees?",
                "acceptedAnswer": { "@type": "Answer", "text": "Everything is priced and billed in NPR. Pay with eSewa, Khalti or IME Pay — no USD card — and get PAN-backed VAT invoices." }
              },
              {
                "@type": "Question",
                "name": "I run one brand, not an agency. Is this overkill?",
                "acceptedAnswer": { "@type": "Answer", "text": "No. Brand accounts give you the same editor, brand kit and deliverability with the multi-client machinery hidden — a clean single-brand workspace you can grow from later." }
              },
              {
                "@type": "Question",
                "name": "Is my clients’ data safe and separated?",
                "acceptedAnswer": { "@type": "Answer", "text": "Each client is its own isolated workspace — separate contacts, domains, branding and reports — and you control who on your team sees what." }
              },
              {
                "@type": "Question",
                "name": "Is there really a free start with no card?",
                "acceptedAnswer": { "@type": "Answer", "text": "Yes. Join the early-access list and start building with no credit card; you only pay in NPR once you’re ready to send to your real audience." }
              }
            ]
          }
        ]
      }
    </script>
