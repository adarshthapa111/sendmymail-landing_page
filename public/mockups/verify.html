<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SendMyMail — Verify email</title>
<link rel="stylesheet" href="_shared.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card single">
    <div class="auth-form center">
      <div class="logo center"><span class="mark">S</span> SendMyMail</div>
      <div style="width:68px;height:68px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:grid;place-items:center;font-size:30px;margin:4px auto 18px;"><i class="ti ti-mail-check"></i></div>
      <h2>Check your inbox</h2>
      <p class="subtitle" style="margin-bottom:4px;">We sent a 6-digit code to</p>
      <p style="font-weight:600;margin:0 0 18px;">prasiddha@nirvanaagency.com</p>
      <div class="otp"><input maxlength="1" value="4"><input maxlength="1" value="9"><input maxlength="1" value="2"><input maxlength="1"><input maxlength="1"><input maxlength="1"></div>
      <button class="btn btn-primary btn-block btn-lg" onclick="location.href='workspace_setup.html'">Verify &amp; continue</button>
      <p style="margin-top:18px;font-size:13px;color:var(--muted);">Didn't get it? <a class="auth-link">Resend code</a> · <a class="auth-link" onclick="location.href='signup.html'">Change email</a></p>
    </div>
  </div>
</div>
</body>
</html>
