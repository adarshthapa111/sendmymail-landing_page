<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SendMyMail — Workspace setup</title>
<link rel="stylesheet" href="_shared.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card single" style="max-width:540px;">
    <div class="auth-form">
      <div class="logo"><span class="mark">S</span> SendMyMail</div>
      <div style="display:flex;gap:8px;margin-bottom:18px;"><span class="pill green dot">Email verified</span><span class="pill purple">Step 1 · Workspace</span></div>
      <h2>Tell us about your agency</h2>
      <p class="subtitle">This becomes your workspace. Invite teammates after this step.</p>
      <div class="field"><label class="label">Agency name</label><input class="input" value="Nirvana Agency"></div>
      <div class="field"><label class="label">Workspace URL</label><div class="suffix-input"><input value="nirvana"><span class="sfx">.sendmymail.np</span></div><div class="helper ok"><i class="ti ti-check" style="font-size:11px;"></i> Available</div></div>
      <div class="row grid-2" style="gap:12px;">
        <div class="field"><label class="label">Team size</label><select class="input"><option>Just me</option><option selected>2–5 people</option><option>6–15 people</option></select></div>
        <div class="field"><label class="label">Clients to manage</label><select class="input"><option>1–3 clients</option><option selected>4–10 clients</option><option>11–30 clients</option></select></div>
      </div>
      <button class="btn btn-primary btn-block btn-lg" onclick="location.href='onboarding.html'">Create my workspace →</button>
    </div>
  </div>
</div>
</body>
</html>
