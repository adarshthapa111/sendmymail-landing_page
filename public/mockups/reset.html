<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SendMyMail — Set new password</title>
<link rel="stylesheet" href="_shared.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card single">
    <div class="auth-form">
      <div class="logo"><span class="mark">S</span> SendMyMail</div>
      <h2>Set a new password</h2>
      <p class="subtitle">For <strong>prasiddha@nirvanaagency.com</strong></p>
      <div class="field"><label class="label">New password</label><input class="input" type="password" value="**************"><div class="helper ok">Excellent · 14 chars, mixed case, number, symbol</div></div>
      <div class="field"><label class="label">Confirm new password</label><input class="input" type="password" value="**************"><div class="helper ok"><i class="ti ti-check" style="font-size:11px;"></i> Passwords match</div></div>
      <label class="checkbox" style="margin-bottom:16px;"><input type="checkbox" checked> Log out of all my other sessions</label>
      <button class="btn btn-primary btn-block btn-lg" onclick="location.href='login.html'">Update password</button>
    </div>
  </div>
</div>
</body>
</html>
