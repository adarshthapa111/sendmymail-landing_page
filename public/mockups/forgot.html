<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SendMyMail — Forgot password</title>
<link rel="stylesheet" href="_shared.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card single">
    <div class="auth-form">
      <div class="logo"><span class="mark">S</span> SendMyMail</div>
      <h2>Reset your password</h2>
      <p class="subtitle">Enter your email and we'll send a reset link</p>
      <div class="field"><label class="label">Email</label><input class="input" type="email" placeholder="you@youragency.com"></div>
      <button class="btn btn-primary btn-block btn-lg" onclick="location.href='reset.html'">Send reset link</button>
      <p style="text-align:center;margin-top:18px;font-size:13px;color:var(--muted);">If an account exists, we'll email a link. Remembered it? <a class="auth-link" onclick="location.href='login.html'">Back to login</a></p>
    </div>
  </div>
</div>
</body>
</html>
